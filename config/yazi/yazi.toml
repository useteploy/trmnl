[manager]
ratio = [1, 3, 4]
show_hidden = true
show_symlink = true
sort_by = "natural"
sort_dir_first = true

[preview]
max_width = 1000
max_height = 1000

[opener]
edit = [
  { run = 'nvim "$@"', block = true, for = "unix" },
]
open = [
  { run = 'open "$@"', for = "macos" },
]

[open]
rules = [
  { mime = "text/*", use = "edit" },
  { mime = "application/json", use = "edit" },
  { name = "*.ts", use = "edit" },
  { name = "*.tsx", use = "edit" },
  { name = "*.js", use = "edit" },
  { name = "*.jsx", use = "edit" },
  { name = "*.md", use = "edit" },
  { name = "*.toml", use = "edit" },
  { name = "*.yaml", use = "edit" },
  { name = "*.yml", use = "edit" },
  { name = "*.lua", use = "edit" },
  { name = "*.kdl", use = "edit" },
  { name = "*", use = "open" },
]
