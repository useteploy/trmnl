# Minimal prompt matching Tokyo Night aesthetic
format = """$directory$git_branch$git_status$character"""
right_format = """$cmd_duration$nodejs$python$rust$golang$zig"""

[character]
success_symbol = "[❯](bold #7aa2f7)"
error_symbol = "[❯](bold #f7768e)"

[directory]
style = "bold #7dcfff"
truncation_length = 3
truncate_to_repo = true

[git_branch]
symbol = " "
style = "bold #bb9af7"

[git_status]
style = "bold #e0af68"
format = '([$all_status$ahead_behind]($style) )'

[cmd_duration]
min_time = 2_000
style = "bold #565f89"
format = "[$duration]($style) "

[nodejs]
symbol = " "
style = "#9ece6a"
format = "[$symbol$version]($style) "

[python]
symbol = " "
style = "#e0af68"
format = "[$symbol$version]($style) "

[rust]
symbol = " "
style = "#f7768e"
format = "[$symbol$version]($style) "

[golang]
symbol = " "
style = "#7dcfff"
format = "[$symbol$version]($style) "

[zig]
symbol = " "
style = "#ff9e64"
format = "[$symbol$version]($style) "
